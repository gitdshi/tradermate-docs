# Production Docker Compose Template (adapt to your environment)

version: '3.8'

services:
  api:
    image: ${API_IMAGE:-tradermate-api:latest}
    container_name: tradermate_api
    restart: unless-stopped
    environment:
      # core
      DEBUG: 'false'
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}

      # mysql
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-tradermate}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TRADERMATE_DB: ${TRADERMATE_DB:-tradermate}
      TUSHARE_DB: ${TUSHARE_DB:-tushare}

      # redis
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}

      # data
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}

      # cors (JSON array string)
      CORS_ORIGINS: ${CORS_ORIGINS:-"[\"https://www.tradermate.com\"]"}
    depends_on:
      - mysql
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # ports:
    #   - "8000:8000"  # expose only if not using an external reverse proxy

  worker:
    image: ${API_IMAGE:-tradermate-api:latest}
    container_name: tradermate_worker
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-tradermate}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    command: ["rq", "worker", "--url", "redis://redis:6379", "backtest", "optimization"]

  mysql:
    image: mysql:8.0
    container_name: tradermate_mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER:-tradermate}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${TRADERMATE_DB:-tradermate}
    volumes:
      - mysql_data:/var/lib/mysql
      # mount init scripts from the `tradermate/mysql/init/` folder
      # - ./mysql/init:/docker-entrypoint-initdb.d:ro
    expose:
      - "3306"

  redis:
    image: redis:7-alpine
    container_name: tradermate_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    expose:
      - "6379"

  portal:
    image: ${PORTAL_IMAGE:-tradermate-portal:latest}
    container_name: tradermate_portal
    restart: unless-stopped
    environment:
      VITE_API_URL: ${API_URL:-https://api.tradermate.com}
    # ports:
    #   - "5173:80"  # expose only if not using an external reverse proxy

volumes:
  mysql_data:
  redis_data:
